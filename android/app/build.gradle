apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'

android {
    namespace = "com.youwenqwq.ysuclient"
    compileSdk = rootProject.ext.compileSdkVersion
    buildFeatures {
        buildConfig = true
    }
    defaultConfig {
        applicationId "com.youwenqwq.ysuclient"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionName "1.4.1"
        def versionMatcher = versionName =~ /^(\d+)\.(\d+)\.(\d+)(?:-(alpha|beta|rc)\.(\d+))?$/
        if (!versionMatcher.matches()) {
            throw new GradleException("Invalid versionName: ${versionName}")
        }
        def major = versionMatcher[0][1].toInteger()
        def minor = versionMatcher[0][2].toInteger()
        def patch = versionMatcher[0][3].toInteger()
        def prereleaseStage = versionMatcher[0][4]
        def prereleaseNumber = versionMatcher[0][5] ? versionMatcher[0][5].toInteger() : 0
        def stageCode = 99
        if (prereleaseStage != null) {
            if (prereleaseNumber < 1) {
                throw new GradleException("Invalid prerelease number in versionName: ${versionName}")
            }
            if (prereleaseStage == "alpha") {
                if (prereleaseNumber > 19) {
                    throw new GradleException("alpha prerelease number must be 1..19: ${versionName}")
                }
                stageCode = prereleaseNumber
            } else if (prereleaseStage == "beta") {
                if (prereleaseNumber > 29) {
                    throw new GradleException("beta prerelease number must be 1..29: ${versionName}")
                }
                stageCode = 20 + prereleaseNumber
            } else if (prereleaseStage == "rc") {
                if (prereleaseNumber > 48) {
                    throw new GradleException("rc prerelease number must be 1..48: ${versionName}")
                }
                stageCode = 50 + prereleaseNumber
            }
        }
        versionCode major * 1000000 + minor * 10000 + patch * 100 + stageCode
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            storeFile file('release.keystore')
            storeType 'PKCS12'
            storePassword project.findProperty('KEYSTORE_PASSWORD') ?: ''
            keyAlias "ysu-client"
            keyPassword project.findProperty('KEY_PASSWORD') ?: ''
        }
    }
    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
        debug {
            signingConfig signingConfigs.release
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "com.google.android.material:material:$materialVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation "androidx.work:work-runtime-ktx:2.11.2"
    implementation "com.squareup.okhttp3:okhttp:5.3.2"
    debugImplementation("com.reqable.android:user-certificate-trust:1.0.0")
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
